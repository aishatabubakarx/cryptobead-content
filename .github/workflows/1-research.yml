name: 1 - Research Daily Topics

on:
  schedule:
    - cron: '0 11 * * *'   # 7:00 AM Eastern (EDT, UTC-4). See note in README about DST.
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run research script
        run: python automation/research_topics.py

      - name: Commit and push
        run: |
          git config --global user.name "Automation Engine"
          git config --global user.email "automation@cryptobead.com"
          git add news/pending_topics.json
          git commit -m "Research: today's topic shortlist" || exit 0
          git push
